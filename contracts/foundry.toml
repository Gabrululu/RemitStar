[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
polkadot_hub_testnet = "${RPC_URL}"

[etherscan]
polkadot_hub_testnet = { key = "any", url = "https://assethub-paseo.subscan.io/api" }
